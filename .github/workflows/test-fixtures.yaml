name: test-fixtures

on:
  workflow_call:

jobs:
  fixture-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build CLI
        run: go build -o bin/dwscript ./cmd/dwscript

      # Ground-truth, does-not-skip-anything compatibility table. Informational: the
      # regression gate itself lives in the Go harness (test-unit / TestDWScriptFixtures),
      # which fails the build if any category drops below its baseline.
      - name: Fixture compatibility report
        run: go run ./cmd/fixture-report
