name: test-lint

on:
  workflow_call:

jobs:
  test-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Setup just
        uses: extractions/setup-just@v2

      - name: Check go mod tidy
        run: just check-tidy

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          # Pinned: .golangci.yml uses the v2 config format, which the v1
          # binary installed by action@v4 "latest" could not parse.
          version: v2.12.1
          # Gate PRs on newly introduced findings only; the pre-existing
          # backlog stays visible when linting main directly.
          only-new-issues: true
