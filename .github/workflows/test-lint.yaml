name: test-lint

on:
  workflow_call:

jobs:
  test-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Setup just
        uses: extractions/setup-just@v2

      - name: Check go mod tidy
        run: just check-tidy

      - name: Run golangci-lint
        # golangci-lint v2 config (.golangci.yml `version: "2"`) requires the
        # v7 action, which installs a v2 binary. The v4 action installed v1,
        # which rejects the v2 config ("v2 config with v1").
        #
        # only-new-issues restricts reporting to lines changed in the PR. The
        # linter was previously never enforced (the v1 binary errored out before
        # running), so ~780 pre-existing issues exist across the tree; gating on
        # new issues keeps PRs from adding debt without blocking on the backlog.
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0
          only-new-issues: true
